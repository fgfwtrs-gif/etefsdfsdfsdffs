[protocols.wireguard]
title = "WireGuard"
description = "Для роутеров и клиентов с поддержкой WG"
enabled = true
inbound_id = 7
# Для WireGuard ниже уже подставлены твои server-side данные.
# Автосоздание peer в 3x-ui всё ещё зависит от отдельной логики панели,
# но в меню протокол теперь будет отображаться.
client_template_json = """{
  "email": {json_email},
  "limitIp": {limit_ip},
  "totalGB": {total_bytes},
  "expiryTime": {expiry_time},
  "enable": {json_enabled},
  "tgId": {json_tg_id},
  "subId": {json_sub_id},
  "comment": {json_comment},
  "reset": {reset}
}"""
access_template = """[Interface]
PrivateKey = {client_private_key}
Address = {client_address}
DNS = 1.1.1.1, 1.0.0.1
MTU = 1420

[Peer]
PublicKey = d+OcYOc+Q1BVA6wGT1fJtLeUdg2dRrWGnOkS1M0pSDQ=
Endpoint = 193.124.22.249:54506
AllowedIPs = 0.0.0.0/0, ::/0"""

