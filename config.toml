[protocols.vless]
title = "VLESS + Reality"
description = "Лучший универсальный вариант"
enabled = true
inbound_id = 6
# client_template_json должен соответствовать именно твоему inbound в 3x-ui
client_template_json = """{
  "id": {json_client_id},
  "flow": "xtls-rprx-vision",
  "email": {json_email},
  "limitIp": {limit_ip},
  "totalGB": {total_bytes},
  "expiryTime": {expiry_time},
  "enable": {json_enabled},
  "tgId": {json_tg_id},
  "subId": {json_sub_id},
  "comment": {json_comment},
  "reset": {reset}
}"""
access_template = "vless://{client_id}@{server_address}:{server_port}?type=tcp&security=reality&pbk={public_key}&fp=chrome&sni={server_name}&sid={short_id}&spx={spider_x}&flow=xtls-rprx-vision#{remark}"

[protocols.vmess]
title = "VMess"
description = "Подходит для части старых клиентов и роутеров"
enabled = false
inbound_id = 2
client_template_json = """{
  "id": {json_client_id},
  "alterId": 0,
  "email": {json_email},
  "limitIp": {limit_ip},
  "totalGB": {total_bytes},
  "expiryTime": {expiry_time},
  "enable": {json_enabled},
  "tgId": {json_tg_id},
  "subId": {json_sub_id},
  "comment": {json_comment},
  "reset": {reset}
}"""
access_template = "vmess://{vmess_b64}"

